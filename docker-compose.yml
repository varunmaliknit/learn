services:
  postgres:
    image: postgres:16-alpine
    container_name: jira-automation-postgres
    environment:
      POSTGRES_USER: jira_automation
      POSTGRES_PASSWORD: jira_automation
      POSTGRES_DB: jira_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira_automation -d jira_automation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
