name: LinkedIn Publish

# Fires when the user clicks Approve / Reject in their email (via Cloudflare
# Worker → repository_dispatch), or comments /approve or /reject on the draft
# issue directly.

on:
  repository_dispatch:
    types: [linkedin_approve, linkedin_reject]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue number to publish from'
        required: false
      action:
        description: 'approve or reject'
        required: true
        default: 'approve'

jobs:
  publish:
    # Only run on:
    #   - repository_dispatch (always trusted; signed by the worker)
    #   - issue_comment by the repo owner ONLY, and only on draft issues with the
    #     /approve or /reject body
    #   - manual workflow_dispatch
    if: |
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       contains(github.event.issue.labels.*.name, 'linkedin-draft') &&
       github.event.comment.user.login == github.repository_owner &&
       (startsWith(github.event.comment.body, '/approve') ||
        startsWith(github.event.comment.body, '/reject')))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Decide action + draft id / issue
        id: decide
        run: |
          set -e
          case "${{ github.event_name }}" in
            repository_dispatch)
              if [ "${{ github.event.action }}" = "linkedin_approve" ]; then
                echo "subcommand=publish" >> "$GITHUB_OUTPUT"
              else
                echo "subcommand=reject" >> "$GITHUB_OUTPUT"
              fi
              echo "draft_id=${{ github.event.client_payload.draft_id }}" >> "$GITHUB_OUTPUT"
              echo "issue=" >> "$GITHUB_OUTPUT"
              ;;
            issue_comment)
              body="${{ github.event.comment.body }}"
              if [[ "$body" == /approve* ]]; then
                echo "subcommand=publish" >> "$GITHUB_OUTPUT"
              else
                echo "subcommand=reject" >> "$GITHUB_OUTPUT"
              fi
              echo "issue=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
              echo "draft_id=" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              if [ "${{ github.event.inputs.action }}" = "reject" ]; then
                echo "subcommand=reject" >> "$GITHUB_OUTPUT"
              else
                echo "subcommand=publish" >> "$GITHUB_OUTPUT"
              fi
              echo "issue=${{ github.event.inputs.issue }}" >> "$GITHUB_OUTPUT"
              echo "draft_id=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_MEMBER_URN: ${{ secrets.LINKEDIN_MEMBER_URN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          sub="${{ steps.decide.outputs.subcommand }}"
          issue="${{ steps.decide.outputs.issue }}"
          draft_id="${{ steps.decide.outputs.draft_id }}"
          args=()
          [ -n "$issue" ] && args+=(--issue "$issue")
          [ -n "$draft_id" ] && args+=(--draft-id "$draft_id")
          linkedin-agent "$sub" "${args[@]}"
