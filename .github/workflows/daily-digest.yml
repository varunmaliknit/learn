name: Daily Portfolio Digest

on:
  schedule:
    # 7 AM UTC = 8 AM BST (UK summer, Mar-Oct)
    # During GMT (Nov-Feb) this will arrive at 7 AM UK time.
    # We use a single cron because GitHub Actions delays scheduled
    # runs by up to 1-3 hours, making strict time checks unreliable.
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Copy config
        run: cp portfolio.yaml.example portfolio.yaml

      - name: Send daily digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: stock-agent --run-once
